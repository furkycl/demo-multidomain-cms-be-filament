name: Keep Render warm

# Render free tier 15 dk inaktiviteden sonra uyur. Çalışma saatlerinde her 14 dakikada
# bir /up endpoint'ini ping atarak servisi ayakta tutar. Trafik arttığında bu workflow'u
# silebilirsin (veya Starter plana geçince).

on:
  schedule:
    - cron: '*/14 7-19 * * 1-5'   # Hafta içi, 07:00-19:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping
        run: |
          if [ -z "${{ secrets.RENDER_URL }}" ]; then
            echo "RENDER_URL secret yok; atlandı."; exit 0
          fi
          curl -fsS -m 30 "${{ secrets.RENDER_URL }}/up" || echo "ping failed (cold start olabilir)"
